name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-checks:
    name: Backend Compilation & Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_hr_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Add UV to Path
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: |
          cd backend
          uv venv
          uv pip install -e .[test]

      - name: Compile Backend Code
        run: |
          cd backend
          uv run python -m compileall app

      - name: Run Backend Tests
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_hr_test
          JWT_SECRET: test_jwt_secret_key_inside_ci
          MOCK_GITHUB: "True"
          GEMINI_API_KEY: mock
          GROQ_API_KEY: mock
        run: |
          cd backend
          uv run python -m pytest -v -s

  frontend-checks:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Frontend Linter
        run: |
          cd frontend
          npm run lint

      - name: Compile Frontend Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: |
          cd frontend
          npm run build

  docker-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Validate Docker Compose Configuration
        run: docker compose config

      - name: Build Backend Container
        run: docker build --tag ai-hr-backend:latest ./backend

      - name: Build Frontend Container
        run: docker build --tag ai-hr-frontend:latest --build-arg NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1 ./frontend
